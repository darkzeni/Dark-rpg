<!DOCTYPE html>
<html>
<head>
  <title>RPG</title>

  <style>
    body {
      margin:0;
      background:#0a0a0a;
      color:#fff;
      font-family:Arial;

      display:flex;
      flex-direction:column;
      height:100vh;
      overflow:hidden;
    }

    #top {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      padding:6px;
      background:#111;
    }

    .panel {
      flex:1 1 45%;
      background:#1a1a1a;
      padding:6px;
      border-radius:6px;
      font-size:11px;
      max-height:85px;
      overflow:auto;
    }

    #chat {
      flex:1;
      padding:10px;
      overflow:auto;
      white-space:pre-wrap;
    }

    #bottom {
      display:flex;
      padding:8px;
      background:#111;
      position:sticky;
      bottom:0;
    }

    input {
      flex:1;
      padding:10px;
      background:#222;
      border:none;
      color:white;
    }

    button {
      padding:10px;
      background:#444;
      color:white;
      border:none;
    }

    .bar {
      height:6px;
      background:#333;
      border-radius:4px;
      margin-top:4px;
      overflow:hidden;
    }

    .fill {
      height:100%;
      background:#4caf50;
      width:0%;
    }
  </style>
</head>

<body>

<div id="top">
  <div id="stats" class="panel"></div>
  <div id="inventory" class="panel"></div>
  <div id="abilities" class="panel"></div>
  <div id="info" class="panel"></div>
  <div id="index" class="panel"></div>
  <div id="task" class="panel"></div>
  <div id="event" class="panel"></div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="cmd" placeholder="type command..." />
  <button onclick="send()">Send</button>
</div>

<script>
let user = localStorage.getItem("user") || "temp";
let lastPlayer = null;

// CHAT
function add(msg){
  let chat = document.getElementById("chat");
  chat.innerText += "\n> " + msg;
  chat.scrollTop = chat.scrollHeight;
}

// FORMAT
function formatObj(obj){
  if(!obj) return "None";
  return Object.entries(obj)
    .map(([k,v]) => `${k}: ${v}`)
    .join("\n");
}

// UI UPDATE
function updateUI(p, worldEvent){
  if(!p) return;
  lastPlayer = p;

  // STATS
  document.getElementById("stats").innerHTML =
`Name: ${p.name}

Lvl: ${p.level}
XP: ${p.xp}/${p.xpNeeded}
SP: ${p.sp}

HP: ${p.hp}/${p.maxHp}
<div class="bar"><div class="fill" style="width:${(p.hp/p.maxHp)*100}%"></div></div>

STR: ${p.stats.strength}
DEF: ${p.stats.defense}
STA: ${p.stats.stamina}
INT: ${p.stats.intelligence}
SPD: ${p.stats.speed}`;

  // INVENTORY
  document.getElementById("inventory").innerText =
"Inventory:\n" + formatObj(p.inventory);

  // ABILITIES
  document.getElementById("abilities").innerText =
"Abilities:\n" + (p.abilities.join("\n") || "None");

  // INDEX
  document.getElementById("index").innerText =
"Seen:\n" + (Object.keys(p.mobIndex).join("\n") || "None");

  // TASK
  if(p.activeTask){
    let total = p.activeTask.duration;
    let done = Date.now() - p.activeTask.start;
    let percent = Math.min(100, (done / total) * 100);

    let timeLeft = Math.max(0, Math.floor((total - done)/1000));

    document.getElementById("task").innerHTML =
`Active: ${p.activeTask.type}
Time: ${timeLeft}s
<div class="bar"><div class="fill" style="width:${percent}%"></div></div>`;
  } else {
    document.getElementById("task").innerText = "Idle";
  }

  // WORLD
  document.getElementById("event").innerText =
    "Event: " + (worldEvent || "None");

  // INFO
  document.getElementById("info").innerText =
`train → 60s
explore → 60s
craft → 45s
discover → 90s

XP → level → SP
add strength

boss = best xp`;
}

// SEND COMMAND
async function send(){
  let input = document.getElementById("cmd");
  let cmd = input.value.trim();
  if(!cmd) return;

  input.value = "";
  add(cmd);

  try{
    let res = await fetch("/command", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ user:user, command:cmd })
    });

    let data = await res.json();

    add(data.msg);
    updateUI(data.player, data.worldEvent);

    if(data.player.name){
      user = data.player.name;
      localStorage.setItem("user", user);
    }

  } catch {
    add("Server error");
  }
}

// ENTER KEY
document.getElementById("cmd").addEventListener("keypress", e=>{
  if(e.key==="Enter") send();
});

// AUTO UPDATE (THIS IS WHAT MAKES IT FEEL ALIVE)
setInterval(()=>{
  if(lastPlayer){
    updateUI(lastPlayer);
  }
}, 1000);

// FOCUS
window.onload = ()=>{
  document.getElementById("cmd").focus();
};
</script>

</body>
</html>
