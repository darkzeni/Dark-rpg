<!DOCTYPE html>
<html>
<head>
  <title>RPG</title>

  <style>
    body {
      background:#0a0a0a;
      color:#fff;
      font-family:Arial;
      margin:0;
      display:flex;
      flex-direction:column;
      height:100vh;
    }

    #top {
      display:flex;
      gap:10px;
      padding:10px;
      background:#111;
    }

    .panel {
      flex:1;
      background:#1a1a1a;
      padding:10px;
      border-radius:8px;
      font-size:12px;
      overflow:auto;
    }

    #chat {
      flex:1;
      padding:10px;
      overflow:auto;
      white-space:pre-wrap;
    }

    #bottom {
      display:flex;
      padding:10px;
      background:#111;
    }

    input {
      flex:1;
      padding:10px;
      background:#222;
      border:none;
      color:white;
    }

    button {
      padding:10px;
      background:#444;
      color:white;
      border:none;
    }
  </style>
</head>

<body>

<div id="top">
  <div id="stats" class="panel">Stats</div>
  <div id="inventory" class="panel">Inventory</div>
  <div id="abilities" class="panel">Abilities</div>
  <div id="info" class="panel">Info</div>
</div>

<div id="top">
  <div id="index" class="panel">Mob Index</div>
  <div id="task" class="panel">Task</div>
  <div id="event" class="panel">World</div>
</div>

<div id="chat"></div>

<div id="bottom">
  <input id="cmd" placeholder="type command..." />
  <button onclick="send()">Send</button>
</div>

<script>
let user = localStorage.getItem("user") || "temp";

function add(msg){
  let chat = document.getElementById("chat");
  chat.innerText += "\n> " + msg;
  chat.scrollTop = chat.scrollHeight;
}

function formatObj(obj){
  if(!obj) return "None";
  return Object.entries(obj).map(([k,v])=>`${k}: ${v}`).join("\n");
}

function updateUI(p, worldEvent){

  // STATS
  document.getElementById("stats").innerText =
`Name: ${p.name}

Level: ${p.level}
XP: ${p.xp}/${p.xpNeeded}
SP: ${p.sp}

HP: ${p.hp}/${p.maxHp}

STR: ${p.stats.strength}
DEF: ${p.stats.defense}
STA: ${p.stats.stamina}
INT: ${p.stats.intelligence}
SPD: ${p.stats.speed}`;

  // INVENTORY
  document.getElementById("inventory").innerText =
"Inventory:\n" + formatObj(p.inventory);

  // ABILITIES
  document.getElementById("abilities").innerText =
"Abilities:\n" + p.abilities.join("\n");

  // MOB INDEX
  document.getElementById("index").innerText =
"Seen:\n" + (Object.keys(p.mobIndex).join("\n") || "None");

  // TASK SYSTEM
  if(p.activeTask){
    let timeLeft = Math.max(0,
      Math.floor((p.activeTask.duration - (Date.now() - p.activeTask.start)) / 1000)
    );

    document.getElementById("task").innerText =
`Active: ${p.activeTask.type}
Time Left: ${timeLeft}s`;
  } else {
    document.getElementById("task").innerText = "Idle";
  }

  // WORLD EVENT
  document.getElementById("event").innerText =
    "Event: " + (worldEvent || "None");

  // INFO PANEL (STATIC GUIDE)
  document.getElementById("info").innerText =
`Quick Info:

train stat → 60s
explore → 60s
craft → 45s
discover → 90s

XP → level → SP

Use:
add strength

Boss = best XP`;
}

async function send(){
  let input = document.getElementById("cmd");
  let cmd = input.value.trim();
  input.value = "";

  if(!cmd) return;

  add(cmd);

  let res = await fetch("/command", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user:user,
      command:cmd
    })
  });

  let data = await res.json();

  add(data.msg);

  updateUI(data.player, data.worldEvent);

  // SAVE NAME
  if(data.player.name){
    user = data.player.name;
    localStorage.setItem("user", user);
  }
}

// ENTER KEY SUPPORT
document.getElementById("cmd").addEventListener("keypress", function(e){
  if(e.key === "Enter") send();
});
</script>

</body>
</html>
