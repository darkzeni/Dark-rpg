<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG AI</title>

<style>
body {
  margin: 0;
  display: flex;
  height: 100vh;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
}

#chat {
  flex: 2;
  display: flex;
  flex-direction: column;
}

#messages {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  max-width: 70%;
}

.user { background: #00ffcc; color: black; margin-left: auto; }
.bot { background: #222; }

#input {
  display: flex;
}

input {
  flex: 1;
  padding: 15px;
  border: none;
  background: #111;
  color: white;
}

button {
  padding: 15px;
  background: #00ffcc;
  border: none;
}

#side {
  flex: 1;
  background: #111;
  padding: 10px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div id="chat">
  <div id="messages"></div>

  <div id="input">
    <input id="cmd" placeholder="Say something...">
    <button onclick="send()">Send</button>
  </div>
</div>

<div id="side">
  <h3>Stats</h3>
  <pre id="stats"></pre>

  <h3>Leaderboard</h3>
  <pre id="leaderboard"></pre>
</div>

<script>
function addMsg(text, type) {
  let div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;
  document.getElementById("messages").appendChild(div);
}

async function send() {
  let input = document.getElementById("cmd");
  let text = input.value;
  if (!text) return;

  addMsg(text, "user");
  input.value = "";

  let res = await fetch("/command", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ user: "player1", command: text })
  });

  let data = await res.json();

  addMsg(data.msg, "bot");

  document.getElementById("stats").innerText =
    JSON.stringify(data.player, null, 2);

  loadBoard();
}

async function loadBoard() {
  let res = await fetch("/leaderboard");
  let data = await res.json();

  document.getElementById("leaderboard").innerText =
    JSON.stringify(data, null, 2);
}

document.getElementById("cmd").addEventListener("keypress", e => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
